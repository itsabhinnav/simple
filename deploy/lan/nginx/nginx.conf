worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    server_tokens off;

    # TLS — certificates generated by deploy/lan/scripts/generate-tls.*
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;

    # Upstream Flask/Gunicorn (internal Docker network only).
    upstream sakura_backend {
        server backend:5000;
        keepalive 16;
    }

    # Authelia forward-auth (optional — enable with `edge-auth` compose profile).
    # When authelia is not running, comment out auth_request lines or use the
    # plain server block below.
    map $http_x_authelia_auth $authelia_user {
        default $http_x_authelia_username;
    }

    # Docker embedded DNS — lazy-resolve optional profile upstreams at request time.
    resolver 127.0.0.11 ipv6=off valid=10s;

    server {
        listen 80;
        server_name _;

        location = /health {
            proxy_pass http://sakura_backend/health;
            proxy_set_header Host $host;
            access_log off;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/certs/sakura.crt;
        ssl_certificate_key /etc/nginx/certs/sakura.key;

        client_max_body_size 64m;

        # Security headers (complement Flask-Talisman).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # Lightweight health probe for the nginx container itself.
        location = /health {
            proxy_pass http://sakura_backend/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # Optional Authelia forward-auth (requires `edge-auth` profile).
        # Uncomment when Authelia is deployed:
        # auth_request /authelia/api/verify;
        # auth_request_set $user $upstream_http_remote_user;
        # error_page 401 =302 /authelia/?rd=$scheme://$host$request_uri;

        location / {
            proxy_pass http://sakura_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Keycloak OIDC broker (requires `iam` profile — lazy DNS so nginx starts without it).
        location /auth/ {
            set $keycloak_upstream keycloak:8080;
            proxy_pass http://$keycloak_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Authelia API (requires `edge-auth` profile).
        location /authelia/ {
            set $authelia_upstream authelia:9091;
            proxy_pass http://$authelia_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
