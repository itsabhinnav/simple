# =============================================================================
# Sakura - docker-compose stack
#
# Single-image deployment: a Flask backend (Gunicorn) that ALSO serves the
# prebuilt Angular SPA at /, with the API at /api/*. SQLite + the RAG vector
# sidecar + uploaded specs live in the `sakura-data` and `sakura-uploads`
# named volumes so they survive container recreation.
#
# The legacy `postgres` profile + remote/Git database mirror were removed —
# the app runs in local-only SQLite mode (see backend/AGENTS.md).
#
# Corporate proxy support:
#   1. Put HTTPS_PROXY=... HTTP_PROXY=... NO_PROXY=... in .env at the repo
#      root (the same .env Flask reads).
#   2. They are forwarded to the build (apt/pip/npm pull through them) and
#      to the running container (so any future outbound calls honour the
#      same proxy as the build phase).
# =============================================================================

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.unified
      args:
        HTTP_PROXY:  ${HTTP_PROXY-}
        HTTPS_PROXY: ${HTTPS_PROXY-}
        NO_PROXY:    ${NO_PROXY-}
    image: sakura-backend:latest
    environment:
      # --- runtime mode ---
      ENVIRONMENT: production
      FLASK_ENV:   production
      HOST: 0.0.0.0
      PORT: 5000
      # --- required secrets ---
      JWT_SECRET_KEY:  ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set in .env}
      ENCRYPTION_KEY:  ${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set in .env}
      # --- CORS / TLS ---
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5000}
      FORCE_HTTPS:     ${FORCE_HTTPS:-false}
      # --- network egress sandbox ---
      # strict (default, loopback only) | allow_lan (loopback + RFC-1918) | off
      ENABLE_NETWORK_RESTRICTIONS: ${ENABLE_NETWORK_RESTRICTIONS:-strict}
      # --- AI / assistant feature flags ---
      # External LLM providers (OpenAI / Anthropic) are refused unless this is
      # flipped on AND the corresponding API key is exported. Local Ollama is
      # unaffected by this flag.
      SAKURA_LLM_ALLOW_EXTERNAL:      ${SAKURA_LLM_ALLOW_EXTERNAL:-false}
      SAKURA_LLM_ALLOW_REMOTE_OLLAMA: ${SAKURA_LLM_ALLOW_REMOTE_OLLAMA:-false}
      # The bundled Ollama daemon is shipped with the desktop installer, not
      # with the container image (the GGUF blobs are multi-GB). Keep the
      # sidecar disabled by default; flip to "false" and mount the model
      # blobs into /app/data/ollama/models if you want in-container VLM.
      SAKURA_DISABLE_OLLAMA_SIDECAR:  ${SAKURA_DISABLE_OLLAMA_SIDECAR:-true}
      SAKURA_DISABLE_LIVE_INDEXER:    ${SAKURA_DISABLE_LIVE_INDEXER:-false}
      # --- proxy passthrough ---
      HTTP_PROXY:  ${HTTP_PROXY-}
      HTTPS_PROXY: ${HTTPS_PROXY-}
      NO_PROXY:    ${NO_PROXY-}
    ports:
      - "${PORT:-5000}:5000"
    volumes:
      # SQLite primary DB + RAG vector sidecar + (optional) Ollama models live
      # under /app/data; uploaded spec files live under /app/uploads. Both
      # survive container recreation via named volumes.
      - sakura-data:/app/data
      - sakura-uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  sakura-data:
  sakura-uploads:
