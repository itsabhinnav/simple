[tool:pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    coverage: Coverage-related tests

# Test execution
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=src
    --cov-branch
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=100

# Coverage configuration
[coverage:run]
source = src
omit = 
    src/__pycache__/*
    src/**/__pycache__/*
    tests/*
    */tests/*
    */test_*
    */conftest.py
branch = True
include = src/**/*.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod
    def __init_subclass__

precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
title = Sakura Backend Coverage Report

[coverage:xml]
output = coverage.xml
