# Sakura Unified Configuration
# This is the single source of truth for all application configuration.
#
# Remote/Git database sync has been removed. The application runs in
# local-only mode against a single SQLite file under backend/data/local.
# Do NOT reintroduce a `storage:` block, a remote DB path, or any flag
# that re-enables git-mirror sync.

# Environment: development, production, or testing
environment: development

# Database Configuration
database:
  provider: hybrid  # sqlite, postgresql, hybrid (hybrid = local-only wrapper)
  name: sakura_db

  # Local-only mode is permanent.
  hybrid_mode: true
  cache_expiry: 3600  # seconds - only used by the in-DB query cache table
  local_db_path: data/local/dev/database/sakura_db.db

  # SQLite settings (when using SQLite)
  data_directory: data/local/dev
  cache_directory: data/local/dev/database

  # PostgreSQL settings (when using PostgreSQL)
  host: localhost
  port: 5432
  username: ""
  password: ""
  schema: public
  connection_pool_size: 10
  connection_timeout: 30
  ssl_enabled: false
  ssl_cert_path:

  # Table names
  table_names:
    users: users
    test_cases: test_cases
    requirements: requirements

# Authentication Configuration
authentication:
  default_admin_username: admin
  default_admin_password: password
  default_admin_email: admin@sakura.com

  session_timeout: 3600  # 1 hour in seconds
  max_login_attempts: 5
  lockout_duration: 900  # 15 minutes in seconds

  reserved_usernames:
    - admin
    - root
    - system
    - administrator
    - sa
  min_password_length: 8
  require_special_chars: true
  require_numbers: true
  require_uppercase: true

# Server Configuration
server:
  host: 0.0.0.0
  port: 5000
  debug: true
  mock_mode: true
  mock_server_port: 8080

  cors_origins:
    - '*'
  cors_methods:
    - GET
    - POST
    - PUT
    - DELETE
  cors_headers:
    - Content-Type
    - Authorization
  rate_limit_enabled: true
  rate_limit_requests: 100
  rate_limit_window: 3600  # 1 hour

# Logging Configuration
logging:
  level: DEBUG
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_path:
  max_file_size: 10485760  # 10MB
  backup_count: 5
  enable_console: true
  enable_file: false
  structured_logging: false
  log_json: false

# Feature Flags
features:
  user_management: true
  test_case_management: true
  requirement_management: true
  advanced_logging: true

# Hybrid Document Parsing
parsing:
  tmp_dir: data/tmp/parsing
  spatial_radius: 4
  vlm:
    allow_remote_providers: false
    default_provider: ollama
    providers:
      ollama:
        base_url: http://localhost:11434
        model: qwen2.5vl:3b
      openai:
        base_url: https://api.openai.com/v1
        model: gpt-4o-mini
      anthropic:
        base_url: https://api.anthropic.com
        model: claude-3-5-sonnet-latest
  celery:
    broker_url: redis://localhost:6379/0
    result_backend: redis://localhost:6379/1

# Test Case Dropdown Configuration
# Single source of truth for dropdown / multi-select option lists rendered
# by the test-case create + detail pages. Update values here to extend the
# pickers; no frontend code change is required.
#
# multi_value_fields declares which test-case columns store multiple
# values (persisted as JSON arrays). The remaining dropdown fields are
# single-select.
test_case_dropdowns:
  multi_value_fields:
    - reference_document
    - associated_requirement_id
    - screen_id
    - feature
    - region
    - brand
    - vehicle_variant
    - vehicle_mode
    - env_dependency
    - testsuite_type
  feature:
    - FOTA
    - Radio
    - BT
    - Launcher
    - Navigation
    - Climate
    - Phone
    - Media
  test_type:
    - Positive
    - Negative
    - Abnormal
    - Boundary
  region:
    - US
    - CAN
    - MEX
    - JPN
    - EU
    - APAC
  brand:
    - Nissan
    - Inifiniti
    - Mitsubishi
  vehicle_variant:
    - PZ1D
    - P33A
    - P33B
    - P33C
    - PZ2D
  vehicle_mode:
    - Common
    - EV
    - HEV
    - ICE
    - PHEV
  env_dependency:
    - ECU
    - Simulator
    - HIL
    - Bench
    - Vehicle
  regulation:
    - true
    - false
  priority:
    - P1
    - P2
    - P3
    - P4
  testsuite_type:
    - Sanity
    - Functional
    - Regression
    - Smoke
    - Performance
    - Acceptance
network:
  allowed_hosts:
    - localhost
    - 127.0.0.1
  restrict_network: false
