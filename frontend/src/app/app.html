<div class="app-container">
  <header class="app-header">
    <div class="header-content">
      <h1 routerLink="/" style="cursor: pointer;">🌸 {{ title() }}</h1>
      <div class="header-center" *ngIf="currentUser()">
        <div class="search-container-header" [class.active]="searchQuery() && searchResults().length > 0">
          <input 
            type="text" 
            class="search-input-header"
            placeholder="Search"
            [value]="searchQuery()"
            (input)="onSearch($any($event.target).value)"
            (blur)="handleSearchBlur($event)"
            (focus)="handleSearchFocus()">
          <span class="search-icon-header">🔍</span>
          
          <!-- Search Results Dropdown -->
          <div class="search-results-dropdown" *ngIf="searchQuery() && searchResults().length > 0 && showSearchResults()" (mousedown)="$event.preventDefault()">
            <div class="result-item-header" *ngFor="let item of searchResults()" (mousedown)="navigateToItem(item, $event)">
              <div class="result-type" *ngIf="'requirement_id' in item">📋 Requirement</div>
              <div class="result-type" *ngIf="'test_case_id' in item">🧪 Test Case</div>
              <div class="result-type" *ngIf="'design_ticket_id' in item">🎨 Design</div>
              
              <div class="result-content">
                <div class="result-id" *ngIf="'requirement_id' in item">{{ item.requirement_id }}</div>
                <div class="result-id" *ngIf="'test_case_id' in item">{{ item.test_case_id }}</div>
                <div class="result-id" *ngIf="'design_ticket_id' in item">{{ item.design_ticket_id }}</div>
                <div class="result-title" *ngIf="'title' in item">{{ item.title }}</div>
                <div class="result-objective" *ngIf="'test_objective' in item">{{ item.test_objective }}</div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="header-right">
        <div class="connection-status" *ngIf="!currentUser()">
          <span class="status-indicator" [class.connected]="message() !== 'Loading...'"></span>
          {{ message() }}
        </div>
        <div *ngIf="currentUser()" class="user-actions">
          <div class="create-container-header">
            <button class="btn-create-header" (click)="toggleCreateMenu()">
              <span class="create-icon">+</span>
              Create
            </button>
            
            <!-- Create Dropdown Menu -->
            <div class="create-menu" *ngIf="showCreateMenu()">
              <button class="menu-item" (click)="createRequirement()">
                <span class="menu-icon">📋</span>
                <span class="menu-text">
                  <strong>Requirement</strong>
                  <small>Create a new requirement</small>
                </span>
              </button>
              <button class="menu-item" (click)="createTestCase()">
                <span class="menu-icon">🧪</span>
                <span class="menu-text">
                  <strong>Test Case</strong>
                  <small>Create a new test case</small>
                </span>
              </button>
              <button class="menu-item" (click)="createDesignTicket()">
                <span class="menu-icon">🎨</span>
                <span class="menu-text">
                  <strong>Design</strong>
                  <small>Create a new design</small>
                </span>
              </button>
            </div>
          </div>
          <span class="user-name">{{ currentUser()?.username }}</span>
          <button class="btn-logout" (click)="logout()">Logout</button>
        </div>
      </div>
    </div>
  </header>
  
  <!-- Quick Actions Bar (Below Navbar) -->
  <div class="quick-actions-global" *ngIf="currentUser() && isDashboardPage()">
    <div class="quick-actions-bar">
      <button class="action-btn" (click)="createRequirement()">
        <span class="action-icon">+</span>
        <span>New Requirement</span>
      </button>
      <button class="action-btn" (click)="createTestCase()">
        <span class="action-icon">+</span>
        <span>New Test Case</span>
      </button>
      <button class="action-btn secondary" routerLink="/requirements">
        <span>📋</span>
        <span>All Requirements</span>
      </button>
      <button class="action-btn secondary" routerLink="/test-cases">
        <span>🧪</span>
        <span>All Test Cases</span>
      </button>
    </div>
  </div>
  
  <main class="app-main">
    <router-outlet></router-outlet>
  </main>
</div>
