<div class="app-container">
  <header class="app-header">
    <div class="header-content">
      <h1>{{ title() }}</h1>
      <div class="connection-status">
        <span class="status-indicator" [class.connected]="message() !== 'Loading...'"></span>
        {{ message() }}
      </div>
    </div>
  </header>
  
  <main class="app-main">
    <router-outlet />
  </main>
</div>
