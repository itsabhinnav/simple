name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest
      - name: Run backend tests
        env:
          # CI lives outside any LAN we trust; force loopback-only egress.
          ENABLE_NETWORK_RESTRICTIONS: strict
          # Background sidecars / RAG indexer would just slow tests down.
          SAKURA_DISABLE_OLLAMA_SIDECAR: 'true'
          SAKURA_DISABLE_LIVE_INDEXER: 'true'
        run: |
          cd backend
          pytest

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci || npm install
      - name: Build (production)
        run: |
          cd frontend
          npm run build -- --configuration production

  docker-compose-smoke:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate .env secrets
        run: |
          JWT=$(python3 -c "import secrets; print(secrets.token_urlsafe(48))")
          ENC=$(python3 -c "import base64,os; print(base64.urlsafe_b64encode(os.urandom(32)).decode())")
          cp .env.example .env
          sed -i "s|^JWT_SECRET_KEY=.*|JWT_SECRET_KEY=${JWT}|" .env
          sed -i "s|^ENCRYPTION_KEY=.*|ENCRYPTION_KEY=${ENC}|" .env
          sed -i "s|^ALLOWED_ORIGINS=.*|ALLOWED_ORIGINS=https://localhost|" .env

      - name: Generate TLS material
        run: bash deploy/lan/scripts/generate-tls.sh 127.0.0.1

      - name: Build and start stack
        run: docker compose --profile parsing up -d --build

      - name: Wait for healthy backend
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1/health >/dev/null 2>&1; then
              echo "Health OK"
              exit 0
            fi
            sleep 5
          done
          docker compose logs
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v

  build-and-push:
    needs: [test-backend, test-frontend, docker-compose-smoke]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Single unified image: Flask backend + bundled Angular SPA. The legacy
      # split-image build (backend-only + nginx-frontend) is no longer
      # published — the unified image is what docker-compose.yml drives.
      - name: Build and push unified image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.unified
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
