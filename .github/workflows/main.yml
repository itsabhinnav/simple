name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
    tags: ['v*.*.*', 'v*.*.*-*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Docker Hub repository (https://hub.docker.com/r/sriabhi001/simple)
  DOCKERHUB_IMAGE: sriabhi001/simple

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest
      - name: Run backend tests
        env:
          ENABLE_NETWORK_RESTRICTIONS: strict
          SAKURA_DISABLE_OLLAMA_SIDECAR: 'true'
          SAKURA_DISABLE_LIVE_INDEXER: 'true'
        run: |
          cd backend
          pytest

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci || npm install
      - name: Build (production)
        run: |
          cd frontend
          npm run build -- --configuration production
      - name: npm audit (production)
        run: |
          cd frontend
          npm audit --omit=dev --audit-level=high

  docker-compose-smoke:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate .env secrets
        run: |
          JWT=$(python3 -c "import secrets; print(secrets.token_urlsafe(48))")
          ENC=$(python3 -c "import base64,os; print(base64.urlsafe_b64encode(os.urandom(32)).decode())")
          cp .env.example .env
          sed -i "s|^JWT_SECRET_KEY=.*|JWT_SECRET_KEY=${JWT}|" .env
          sed -i "s|^ENCRYPTION_KEY=.*|ENCRYPTION_KEY=${ENC}|" .env
          sed -i "s|^ALLOWED_ORIGINS=.*|ALLOWED_ORIGINS=https://localhost|" .env
          sed -i "s|^SAKURA_BACKEND_IMAGE=.*|SAKURA_BACKEND_IMAGE=${{ env.DOCKERHUB_IMAGE }}:latest|" .env

      - name: Generate TLS material
        run: bash deploy/lan/scripts/generate-tls.sh 127.0.0.1

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Wait for healthy backend
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1/health >/dev/null 2>&1; then
              echo "Health OK"
              exit 0
            fi
            sleep 5
          done
          docker compose logs
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v

  build-and-push:
    name: Build & publish to Docker Hub
    needs: [test-backend, test-frontend, docker-compose-smoke]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Verify Docker Hub secrets
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::Add DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repository secrets."
            echo "See deploy/registry/DOCKERHUB.md"
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push unified image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.unified
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish deploy summary
        run: |
          {
            echo "### Docker image published"
            echo ""
            echo "**Docker Hub:** [\`${{ env.DOCKERHUB_IMAGE }}:latest\`](https://hub.docker.com/r/${{ env.DOCKERHUB_IMAGE }})"
            echo ""
            echo "Deploy \`.env\`:"
            echo "\`\`\`"
            echo "SAKURA_BACKEND_IMAGE=${{ env.DOCKERHUB_IMAGE }}:latest"
            echo "\`\`\`"
            echo ""
            echo "Pull: \`docker pull ${{ env.DOCKERHUB_IMAGE }}:latest\`"
          } >> "$GITHUB_STEP_SUMMARY"
